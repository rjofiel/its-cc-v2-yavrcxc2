<div class="p-6 max-w-md mx-auto bg-white border rounded-lg shadow-sm">
  <h2 class="text-lg font-semibold mb-4 text-center">
    {{ count() }} things I have to do:
  </h2>

  <form
    [formGroup]="todoForm"
    (ngSubmit)="onSubmit()"
    id="todo-form"
    class="flex flex-col gap-2 mb-4"
  >
    <div class="form-group space-y-2">
      <label for="title" class="visually-hidden">Título</label>
      <input
        id="title"
        type="text"
        formControlName="title"
        placeholder="Nueva tarea..."
        class="w-full px-3 py-2 border rounded focus:ring-purple-500 focus:border-transparent outline-none"
        aria-describedby="title-error"
      />
    </div>

    <div class="form-group space-x-2">
      <label for="priority" class="visually-hidden">Prioridad</label>
      <select
        id="priority"
        formControlName="priority"
        class="px-2 py-2 border rounded bg-white"
      >
        <option [value]="1">Baja</option>
        <option [value]="3">Alta</option>
      </select>
    </div>

    <button
      type="submit"
      [disabled]="todoForm.invalid"
      class="px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700 disabled:bg-gray-300"
      aria-describedby="submit-status"
    >
      Agregar
    </button>
  </form>

  <section
    id="todo-filters"
    class="flex gap-2 mb-4 justify-center"
    role="group"
    aria-label="Filtrar tareas"
  >
    <button
      type="button"
      class="px-3 py-1 text-sm rounded transition"
      [class.bg-purple-600]="currentFilter() === 'all'"
      [class.text-white]="currentFilter() === 'all'"
      [class.bg-gray-100]="currentFilter() !== 'all'"
      (click)="setFilter('all')"
      [attr.aria-pressed]="currentFilter() === 'all'"
    >
      Todas
    </button>
    <button
      type="button"
      class="px-3 py-1 text-sm rounded transition"
      [class.bg-purple-600]="currentFilter() === 'pending'"
      [class.text-white]="currentFilter() === 'pending'"
      [class.bg-gray-100]="currentFilter() !== 'pending'"
      (click)="setFilter('pending')"
      [attr.aria-pressed]="currentFilter() === 'pending'"
    >
      Pendientes
    </button>
    <button
      type="button"
      class="px-3 py-1 text-sm rounded transition"
      [class.bg-purple-600]="currentFilter() === 'completed'"
      [class.text-white]="currentFilter() === 'completed'"
      [class.bg-gray-100]="currentFilter() !== 'completed'"
      (click)="setFilter('completed')"
      [attr.aria-pressed]="currentFilter() === 'completed'"
    >
      Completadas
    </button>
  </section>

  <ul class="flex flex-col gap-2" id="todoList">
    @for (todo of store.filteredTodos(); track todo.id) {
    <li
      class="flex gap-3 items-center p-2 bg-gray-50 rounded hover:bg-gray-100"
    >
      <label
        [for]="'todo-' + todo.id"
        class="flex-1 cursor-pointer"
        [class.line-through]="todo.completed"
      >
        {{todo.title}}
      </label>

      <button
        [id]="'priority-' + todo.id"
        class="hover:opacity-70"
        [class.fill-red-500]="todo.completed"
        (click)="toggleComplete(todo.id)"
      >
        <svg
          version="1.1"
          id="Capa_1"
          xmlns="http://www.w3.org/2000/svg"
          xmlns:xlink="http://www.w3.org/1999/xlink"
          width="24px"
          height="24px"
          viewBox="-4.53 -4.53 54.37 54.37"
          xml:space="preserve"
          transform="rotate(0)"
        >
          <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
          <g
            id="SVGRepo_tracerCarrier"
            stroke-linecap="round"
            stroke-linejoin="round"
          ></g>
          <g id="SVGRepo_iconCarrier">
            <g>
              <path
                d="M22.675,0.02c-0.006,0-0.014,0.001-0.02,0.001c-0.007,0-0.013-0.001-0.02-0.001C10.135,0.02,0,10.154,0,22.656 c0,12.5,10.135,22.635,22.635,22.635c0.007,0,0.013,0,0.02,0c0.006,0,0.014,0,0.02,0c12.5,0,22.635-10.135,22.635-22.635 C45.311,10.154,35.176,0.02,22.675,0.02z M22.675,38.811c-0.006,0-0.014-0.001-0.02-0.001c-0.007,0-0.013,0.001-0.02,0.001 c-2.046,0-3.705-1.658-3.705-3.705c0-2.045,1.659-3.703,3.705-3.703c0.007,0,0.013,0,0.02,0c0.006,0,0.014,0,0.02,0 c2.045,0,3.706,1.658,3.706,3.703C26.381,37.152,24.723,38.811,22.675,38.811z M27.988,10.578 c-0.242,3.697-1.932,14.692-1.932,14.692c0,1.854-1.519,3.356-3.373,3.356c-0.01,0-0.02,0-0.029,0c-0.009,0-0.02,0-0.029,0 c-1.853,0-3.372-1.504-3.372-3.356c0,0-1.689-10.995-1.931-14.692C17.202,8.727,18.62,5.29,22.626,5.29 c0.01,0,0.02,0.001,0.029,0.001c0.009,0,0.019-0.001,0.029-0.001C26.689,5.29,28.109,8.727,27.988,10.578z"
              ></path>
            </g>
          </g>
        </svg>
      </button>

      <input
        type="checkbox"
        [name]="todo.title"
        [id]="'todo-' + todo.id"
        2
        class="w-4 h-4"
        [attr.aria-label]="todo.completed ? 'Marcado como pendiente' : 'Marcado como completado'"
      />

      <button
        class="delete-btn px-2 py-1 text-red-600 hover:bg-red-50 rounded text-sm"
        (click)="delete(todo.id)"
        [attr.aria-label]="'Eliminar tarea: ' + todo.title"
      >
        Eliminar
      </button>
    </li>
    } @empty {
    <li class="text-gray-400 p-4 text-center">No hay tareas</li>
    }
  </ul>
</div>
